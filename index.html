<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sereno Historia | Imperios, Batallas y Líderes</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #1a1a1a;
            --accent: #c9a14c;
            --text: #e0e0e0;
            --text-light: #bbbbbb;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        header {
            background: linear-gradient(to bottom, rgba(0,0,0,0.95), var(--bg));
            padding: 3rem 0 2rem;
            text-align: center;
            border-bottom: 4px solid var(--accent);
        }

        h1 {
            font-size: 3.8rem;
            color: var(--accent);
            margin-bottom: 0.5rem;
            text-shadow: 0 0 25px rgba(201, 161, 76, 0.4);
        }

        .subtitle {
            font-size: 1.5rem;
            color: #aaa;
            font-style: italic;
        }

        nav {
            background-color: var(--card);
            padding: 1.2rem;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }

        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 1.8rem;
            font-size: 1.15rem;
            padding: 0.9rem 1.8rem;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        nav a:hover {
            background-color: var(--accent);
            color: #000;
            transform: translateY(-2px);
        }

        main {
            max-width: 1200px;
            margin: 3rem auto;
            padding: 0 2rem;
        }

        .welcome {
            background-color: var(--card);
            padding: 3rem;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 4rem;
            border: 1px solid #333;
        }

        .welcome h2 {
            font-size: 2.4rem;
            color: var(--accent);
            margin-bottom: 1rem;
        }

        /* Sección Explorar */
        .explore-section {
            margin: 4rem 0;
        }

        .section-title {
            font-size: 2.3rem;
            color: var(--accent);
            text-align: center;
            margin-bottom: 2.5rem;
        }
