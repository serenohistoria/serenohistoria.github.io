<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sereno Historia | Imperios, Batallas y Líderes</title>

    <style>
        :root {
            --bg: #0a0a0a;
            --card: #161616;
            --accent: #d4af37;
            --text: #f0f0f0;
            --text-light: #aaaaaa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        header {
            background: linear-gradient(to bottom, #1c1c1c, var(--bg));
            padding: 80px 20px 60px;
            text-align: center;
            border-bottom: 6px solid var(--accent);
        }

        h1 {
            font-size: 4rem;
            color: var(--accent);
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.5);
        }

        .subtitle {
            font-size: 1.5rem;
            color: #cccccc;
            font-style: italic;
        }

        nav {
            background-color: #111;
            padding: 15px 0;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav a {
            color: var(--text);
            text-decoration: none;
            margin: 0 10px;
            font-size: 1.1rem;
            padding: 10px 20px;
            border-radius: 50px;
            transition: all 0.3s;
        }

        nav a:hover {
            background-color: var(--accent);
            color: #000;
        }

        main {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .section-title {
            text-align: center;
            font-size: 2.3rem;
            color: var(--accent);
            margin: 50px 0;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .card {
            background-color: var(--card);
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            border: 1px solid #333;
            cursor: pointer;
            transition: 0.4s;

            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.6s ease forwards;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--accent);
            box-shadow: 0 15px 30px rgba(212, 175, 55, 0.2);
        }

        .emoji {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .card h3 {
            color: var(--accent);
            margin-bottom: 10px;
        }

        .card p {
            color: var(--text-light);
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #1a1a1a;
            width: 90%;
            max-width: 800px;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid var(--accent);
        }

        .modal-header {
            padding: 20px;
            background: #222;
            display: flex;
            justify-content: space-between;
        }

        .modal-header h2 {
            color: var(--accent);
        }

        .close {
            font-size: 2rem;
            cursor: pointer;
        }

        .modal-body {
            padding: 20px;
            max-height: 60vh;
            overflow-y: auto;
        }

        .list-item {
            display: block;
            padding: 15px;
            background: #222;
            margin-bottom: 10px;
            border-radius: 10px;
            text-decoration: none;
            color: var(--text);
            transition: 0.3s;
        }

        .list-item:hover {
            background: #2a2a2a;
            padding-left: 20px;
        }

        footer {
            text-align: center;
            padding: 50px;
            color: #555;
        }

        /* RESPONSIVE */
        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .subtitle { font-size: 1.2rem; }

            nav a {
                display: block;
                margin: 8px 0;
            }
        }

    </style>
</head>

<body>

<header>
    <h1>Sereno Historia</h1>
    <p class="subtitle">Imperios • Batallas • Líderes</p>
</header>

<nav>
    <a href="#">Inicio</a>
    <a href="#">Imperios</a>
    <a href="#">Batallas</a>
    <a href="#">Líderes</a>
</nav>

<main>
    <h2 class="section-title">Explora la Historia</h2>

    <div class="grid">

        <div class="card" onclick="openModal('antiguedad')">
            <div class="emoji">🏛️</div>
            <h3>Antigüedad</h3>
            <p>Grandes civilizaciones clásicas</p>
        </div>

        <div class="card" onclick="openModal('medievales')">
            <div class="emoji">🏰</div>
            <h3>Edad Media</h3>
            <p>Reinos y pueblos medievales</p>
        </div>

        <div class="card" onclick="openModal('construcciones')">
            <div class="emoji">🏛️</div>
            <h3>Construcciones</h3>
            <p>Maravillas históricas</p>
        </div>

    </div>
</main>

<!-- MODAL -->
<div id="modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modal-title"></h2>
            <span class="close" onclick="closeModal()">×</span>
        </div>
        <div class="modal-body" id="modal-body"></div>
    </div>
</div>

<footer>
    <p>© 2026 Sereno Historia</p>
</footer>

<script>

function openModal(category) {
    const modal = document.getElementById('modal');
    const title = document.getElementById('modal-title');
    const body = document.getElementById('modal-body');

    let html = '';

    if (category === 'antiguedad') {
        title.textContent = 'Antigüedad';

        html = `
        <a href="#" class="list-item">
            <strong>Roma</strong><br>
            <small>El imperio más influyente de la antigüedad</small>
        </a>

        <a href="#" class="list-item">
            <strong>Cartago</strong><br>
            <small>Potencia rival de Roma en el Mediterráneo</small>
        </a>

        <a href="#" class="list-item">
            <strong>Hititas</strong><br>
            <small>Una de las primeras grandes potencias de Anatolia</small>
        </a>
        `;
    }

    else if (category === 'medievales') {
        title.textContent = 'Edad Media';

        html = `
        <a href="#" class="list-item">
            <strong>Búlgaros</strong><br>
            <small>Imperio rival de Bizancio</small>
        </a>

        <a href="#" class="list-item">
            <strong>Serbios</strong><br>
            <small>Reino poderoso en los Balcanes</small>
        </a>
        `;
    }

    else if (category === 'construcciones') {
        title.textContent = 'Construcciones';

        html = `
        <a href="#" class="list-item">
            <strong>Alamut</strong><br>
            <small>Fortaleza de los Asesinos</small>
        </a>

        <a href="#" class="list-item">
            <strong>Knossos</strong><br>
            <small>Centro de la civilización minoica</small>
        </a>
        `;
    }

    body.innerHTML = html;
    modal.style.display = 'flex';
}

function closeModal() {
    document.getElementById('modal').style.display = 'none';
}

window.onclick = function(e) {
    if (e.target.id === 'modal') {
        closeModal();
    }
}

</script>

</body>
</html>
